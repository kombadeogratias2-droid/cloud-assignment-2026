<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Harmony Music Instruments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">
        <h2>🎵 Harmony Music</h2>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

</header>

<section class="products">

    <h2>Contact Us</h2>

    <p style="margin-bottom:30px;">
        We'd love to hear from you. Feel free to contact us anytime.
    </p>

    <div style="max-width:600px; margin:auto;">

        <form>

            <input type="text"
                   placeholder="Your Name"
                   required
                   style="width:100%;padding:12px;margin-bottom:15px;">

            <input type="email"
                   placeholder="Your Email"
                   required
                   style="width:100%;padding:12px;margin-bottom:15px;">
            <input type="tel"
                   placeholder="Phone Number"
                   required
                   style="width:100%;padding:12px;margin-bottom:15px;">

            <input type="text"
                   placeholder="Subject"
                   style="width:100%;padding:12px;margin-bottom:15px;">

            <textarea
                placeholder="Write your message..."
                rows="6"
                style="width:100%;padding:12px;margin-bottom:15px;"></textarea>

            <button class="btn" type="submit">
                Send Message
            </button>

        </form>

    </div>

    <br><br>

    <h3>Our Contact Information</h3>

    <p>📍 Arusha, Tanzania</p>
    <p>📞 +255 700 123 456</p>
    <p>📧 info@harmonymusic.co.tz</p>

</section>

<footer>

<p>© 2026 Harmony Music Instruments | All Rights Reserved</p>

</footer>
